<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lerzo Desktop</title>
    <link rel="icon" type="image/png" href="./static/images/lezo-logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      html { background: #f7f8fa; }
      html[data-theme='dark'] { background: #141414; color-scheme: dark; }
      #electron-boot-fallback {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #141414;
        color: #ececec;
        font-family: Inter, system-ui, sans-serif;
      }
      #electron-boot-fallback .electron-boot-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 24px 28px;
        border-radius: 16px;
        border: 1px solid #2e2e2e;
        background: #1a1a1a;
      }
      #electron-boot-fallback .electron-boot-spinner {
        width: 28px;
        height: 28px;
        border: 3px solid rgba(59, 130, 246, 0.2);
        border-top-color: #3b82f6;
        border-radius: 999px;
        animation: electron-boot-spin 0.8s linear infinite;
      }
      #electron-boot-fallback .electron-boot-logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
        animation: electron-boot-pulse 1.6s ease-in-out infinite;
        filter: drop-shadow(0 0 22px rgba(59, 130, 246, 0.35));
      }
      @keyframes electron-boot-pulse {
        0%, 100% { opacity: 0.55; transform: scale(0.94); }
        50% { opacity: 1; transform: scale(1); }
      }
    </style>
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('lerzo_theme') || 'system';
          var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.dataset.themePreference = pref;
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
          if (dark) document.documentElement.style.colorScheme = 'dark';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div id="electron-boot-fallback" class="electron-boot-fallback">
        <div class="electron-boot-card">
          <img src="./static/images/lezo-logo.png" alt="Lerzo" class="electron-boot-logo" />
          <p>Loading Lerzo...</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
