name: Build Windows Electron App

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    env:
      VITE_API_BASE_URL: https://app.lerzo.com
      VITE_APP_ENV: production
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Prepare production config
        run: npm run prepare:prod-config

      - name: Build renderer only
        run: npm run vite:build

      - name: Sanitize production build
        run: npm run sanitize:prod-build

      - name: Verify required files
        shell: pwsh
        run: |
          if (!(Test-Path "dist/index.html")) {
            Write-Error "dist/index.html missing"
            exit 1
          }
          if (!(Test-Path "splash/splash.html")) {
            Write-Error "splash/splash.html missing"
            exit 1
          }
          if (!(Test-Path "offline/offline.html")) {
            Write-Error "offline/offline.html missing"
            exit 1
          }

      - name: Build Windows EXE and MSI
        run: npx electron-builder --win nsis msi --publish never --config.directories.output=release

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Lerzo-Windows
          path: |
            release/*.exe
            release/*.msi
