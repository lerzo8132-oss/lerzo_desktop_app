<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Server Not Running - Lerzo</title>
    <link rel="stylesheet" href="offline.css">
    <style>
        .dev-server-hint {
            margin-top: 12px;
            padding: 12px 16px;
            border-radius: 10px;
            background: rgba(37, 99, 235, 0.08);
            color: #1e3a8a;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">⚙️</div>
        <h1>Dev server not running</h1>
        <p>Electron could not reach the Vite dev server at <strong>127.0.0.1:5173</strong>.</p>
        <p class="dev-server-hint">npm run dev</p>
        <button id="retry-btn">Retry</button>
    </div>
    <script>
        document.getElementById('retry-btn').addEventListener('click', () => {
            if (window.electronAPI && typeof window.electronAPI.retryLoad === 'function') {
                window.electronAPI.retryLoad();
            } else {
                window.location.reload();
            }
        });
    </script>
</body>
</html>
